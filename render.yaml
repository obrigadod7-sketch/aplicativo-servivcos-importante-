services:
  # Single Docker service: builds frontend + runs backend + serves both
  - type: web
    name: jatai-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api
    envVars:
      - key: MONGO_URL
        sync: false                    # set in Render dashboard (MongoDB Atlas)
      - key: DB_NAME
        value: watizat_db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PIX_KEY
        sync: false                    # set in Render dashboard (your real PIX key)
      - key: PIX_MERCHANT_NAME
        value: JATAI REGIAO TRABALHO
      - key: PIX_MERCHANT_CITY
        value: SAO PAULO
      - key: SUB_AMOUNT
        value: "35.90"
      - key: SUB_TRIAL_DAYS
        value: "3"
