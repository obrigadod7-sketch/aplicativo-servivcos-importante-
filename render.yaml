services:
  # Backend Service
  - type: web
    name: jatai-regiao-backend
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false # You'll need to add this in Render dashboard
    
  # Frontend Service  
  - type: web
    name: jatai-regiao-frontend
    env: node
    plan: free
    buildCommand: cd frontend && yarn install && yarn build
    startCommand: cd frontend && yarn start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: REACT_APP_BACKEND_URL
        value: https://jatai-regiao-backend.onrender.com
        
# Database (MongoDB)
# Note: You'll need to create a MongoDB Atlas account or use Render's MongoDB addon
# and add the MONGO_URL environment variable in the Render dashboard
